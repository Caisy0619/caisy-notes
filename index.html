        `

const allArticles = sections.flatMap(s => s.articles.map(a => ({...a, _section: s.name, _tag: s.tag})));
let savedScroll = 0;
let currentFilter = 'all';

function filterArticles(tag) {
  currentFilter = tag;
  document.querySelectorAll('.tag-btn').forEach(b => b.classList.toggle('active', b.dataset.tag === tag));
  savedScroll = 0;
  renderSections();
  window.scrollTo(0, 0);
}

function renderSections() {
  const group = document.getElementById('sectionGroup');
  const filtered = currentFilter === 'all'
    ? sections
    : sections.filter(s => s.tag === currentFilter);
  group.innerHTML = filtered.map(s => `
    <div style="margin-bottom:32px">
      <div class="section-title">${s.name}</div>
      <div class="section-desc">${s.desc}</div>
      ${s.articles.map(a => `
        <div class="article-card" onclick="showArticle(${a.id})">
          <h2>${a.title}</h2>
          <p>${a.summary}</p>
          <div class="quote">${a.quote}</div>
        </div>
      `).join('')}
    </div>
  `).join('');
}

function renderFilterBar() {
  const bar = document.getElementById('filterBar');
  const tags = [{k:'all',v:'全部'}, {k:'AI管理',v:'AI与管理'}, {k:'修炼',v:'自我修炼'}];
  bar.innerHTML = tags.map(t => `
    <span class="tag-btn${t.k === 'all' ? ' active' : ''}" data-tag="${t.k}" onclick="filterArticles('${t.k}')">${t.tag}</span>
  `).join('');
}

function showList() {
  document.getElementById('sectionGroup').style.display = 'block';
  document.getElementById('articleView').style.display = 'none';
  window.scrollTo(0, savedScroll);
}

function showArticle(id) {
  const a = allArticles.find(x => x.id === id);
  if (!a) return;
  savedScroll = window.scrollY;
  document.getElementById('sectionGroup').style.display = 'none';
  document.getElementById('articleView').style.display = 'block';
  document.getElementById('articleContent').innerHTML = `
    <h1>${a.title}</h1>
    <div class="content">${a.content}</div>
  `;
  window.scrollTo(0, 0);
}

renderFilterBar();
renderSections();
</script>
